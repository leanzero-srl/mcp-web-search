name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      # Hermetic unit tests only (SSRF guard, cleanText, client detection,
      # YAML parsing). Integration / e2e suites hit live search engines and
      # are too flaky for CI — run them locally.
      - name: Unit tests
        run: npm run test:unit
